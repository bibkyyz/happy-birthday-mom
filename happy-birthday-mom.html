<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Mom!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fbc2eb 100%);
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
  }

  .balloons {
    font-size: 3rem;
    margin-bottom: 1rem;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  h1 {
    font-size: clamp(2.5rem, 8vw, 5rem);
    color: #ffffff;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.15), 0 0 30px rgba(255,255,255,0.5);
    animation: pop 1.2s ease-out;
    line-height: 1.15;
  }

  h2 {
    margin-top: 0.5rem;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    color: #fff;
    font-weight: 400;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
  }

  p.subtitle {
    margin-top: 1.5rem;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    color: #fff;
    opacity: 0.95;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }

  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); }
  }

  .btn {
    margin-top: 2rem;
    padding: 0.9rem 2.2rem;
    font-size: 1.1rem;
    border: none;
    border-radius: 50px;
    background: #fff;
    color: #ff6b9d;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: transform 0.2s ease;
  }

  .btn:hover {
    transform: scale(1.08);
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="content">
  <div class="balloons">🎈🎂🎉</div>
  <h1>Happy Birthday</h1>
  <h2>Mom!</h2>
  <p class="subtitle">Thank you for everything you do, every single day. Wishing you the happiest of birthdays and a year filled with joy, love, and laughter. We love you! 💖</p>
  <button class="btn" onclick="burst()">More Confetti! 🎊</button>
</div>

<script>
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const colors = ['#ff6b9d', '#ffd166', '#06d6a0', '#118ab2', '#ef476f', '#8338ec', '#ffbe0b'];

class Confetto {
  constructor() {
    this.reset();
    this.y = Math.random() * -canvas.height;
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = -20;
    this.size = Math.random() * 8 + 6;
    this.speedY = Math.random() * 2 + 2;
    this.speedX = Math.random() * 2 - 1;
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.rotation = Math.random() * 360;
    this.rotationSpeed = Math.random() * 10 - 5;
    this.shape = Math.random() > 0.5 ? 'rect' : 'circle';
    this.opacity = 1;
  }
  update() {
    this.y += this.speedY;
    this.x += this.speedX + Math.sin(this.y * 0.01);
    this.rotation += this.rotationSpeed;
    if (this.y > canvas.height + 20) {
      this.reset();
    }
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate((this.rotation * Math.PI) / 180);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.opacity;
    if (this.shape === 'rect') {
      ctx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

let confetti = [];
for (let i = 0; i < 150; i++) {
  confetti.push(new Confetto());
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  confetti.forEach(c => {
    c.update();
    c.draw();
  });
  requestAnimationFrame(animate);
}
animate();

function burst() {
  for (let i = 0; i < 100; i++) {
    const c = new Confetto();
    c.x = window.innerWidth / 2 + (Math.random() * 200 - 100);
    c.y = window.innerHeight / 2;
    c.speedY = Math.random() * -6 - 2;
    c.speedX = Math.random() * 10 - 5;
    confetti.push(c);
  }
}
</script>

</body>
</html>
